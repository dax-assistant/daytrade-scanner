services:
  daytrade-scanner:
    image: ghcr.io/dax-assistant/daytrade-scanner:latest
    container_name: daytrade-scanner
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "daytrade-scanner"

  daytrade-scanner-watchtower:
    image: containrrr/watchtower:latest
    container_name: daytrade-scanner-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REPO_USER: ${GHCR_USER}
      REPO_PASS: ${GHCR_TOKEN}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: daytrade-scanner
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_CLEANUP: "true"
    labels:
      com.centurylinklabs.watchtower.scope: "daytrade-scanner"
